      <path d="M400 220 L400 582" stroke="#0f1613" stroke-width="14" />
      <path d="M332 262 L463 540" stroke="#132019" stroke-width="12" />
      <path d="M482 250 L353 540" stroke="#0f1914" stroke-width="10" />
      <path d="M276 366 L530 421" stroke="#142019" stroke-width="10" />
      <path d="M290 460 L512 330" stroke="#142019" stroke-width="8" />
      <path d="M330 232 L420 520" stroke="#112018" stroke-width="8" />
      <path d="M480 280 L377 535" stroke="#112018" stroke-width="8" />

      <circle cx="400" cy="400" r="42" fill="#3e7a57" fill-opacity="0.55" />
      <circle
        cx="400"
        cy="400"
        r="23"
        fill="#1d2f25"
        fill-opacity="0.9"
        stroke="#d7ff9a"
        stroke-width="2"
        stroke-opacity="0.3"
      />
    </g>
  </g>

  <!-- Rim shimmer -->
  <circle
    cx="400"
    cy="400"
    r="178"
    fill="none"
    stroke="#f2fff8"
    stroke-opacity="0.7"
    stroke-width="4"
  />
