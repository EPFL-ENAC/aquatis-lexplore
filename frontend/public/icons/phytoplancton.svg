<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 800 800"
  width="800"
  height="800"
>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c7ff9e" stop-opacity="0.95" />
      <stop offset="25%" stop-color="#7bcf7a" stop-opacity="0.85" />
      <stop offset="55%" stop-color="#2f7a58" stop-opacity="0.78" />
      <stop offset="78%" stop-color="#163c30" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0b1813" stop-opacity="0.98" />
    </radialGradient>

    <radialGradient id="innerMist" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#efffd1" stop-opacity="0.28" />
      <stop offset="55%" stop-color="#d6ff74" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b1" />
      <feMerge>
        <feMergeNode in="b1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="b1" />
      <feMerge>
        <feMergeNode in="b1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="coreClip">
      <circle cx="400" cy="400" r="178" />
    </clipPath>
  </defs>

  <!-- Outer halo -->
  <circle
    cx="400"
    cy="400"
    r="188"
    fill="none"
    stroke="#dffff3"
    stroke-opacity="0.8"
    stroke-width="6"
    filter="url(#softGlow)"
  />
  <circle
    cx="400"
    cy="400"
    r="196"
    fill="none"
    stroke="#c7fff0"
    stroke-opacity="0.18"
    stroke-width="18"
    filter="url(#bigGlow)"
  />

  <!-- Radial spikes -->
  <g
    stroke-linecap="round"
    stroke="#f4f6d2"
    stroke-opacity="0.72"
    filter="url(#softGlow)"
  >
    <line x1="400" y1="165" x2="400" y2="68" stroke-width="3.2" />
    <line x1="426" y1="167" x2="437" y2="80" stroke-width="2.4" />
    <line x1="451" y1="173" x2="475" y2="73" stroke-width="2.7" />
    <line x1="475" y1="183" x2="517" y2="81" stroke-width="2.5" />
    <line x1="497" y1="196" x2="553" y2="97" stroke-width="2.3" />
    <line x1="517" y1="214" x2="590" y2="120" stroke-width="2.6" />
    <line x1="533" y1="233" x2="620" y2="142" stroke-width="2.1" />
    <line x1="546" y1="255" x2="644" y2="176" stroke-width="2.4" />
    <line x1="556" y1="278" x2="676" y2="208" stroke-width="2.4" />
    <line x1="563" y1="303" x2="706" y2="245" stroke-width="2.1" />
    <line x1="567" y1="329" x2="729" y2="287" stroke-width="2.5" />
    <line x1="569" y1="355" x2="742" y2="334" stroke-width="2.2" />
    <line x1="569" y1="381" x2="750" y2="381" stroke-width="2.6" />
    <line x1="567" y1="408" x2="742" y2="429" stroke-width="2.1" />
    <line x1="563" y1="434" x2="728" y2="477" stroke-width="2.5" />
    <line x1="556" y1="459" x2="706" y2="514" stroke-width="2.1" />
    <line x1="546" y1="483" x2="674" y2="553" stroke-width="2.3" />
    <line x1="533" y1="505" x2="643" y2="592" stroke-width="2.2" />
    <line x1="517" y1="525" x2="590" y2="618" stroke-width="2.5" />
    <line x1="497" y1="542" x2="553" y2="644" stroke-width="2.2" />
    <line x1="475" y1="555" x2="517" y2="719" stroke-width="2.5" />
    <line x1="451" y1="565" x2="474" y2="724" stroke-width="2.3" />
    <line x1="426" y1="571" x2="437" y2="719" stroke-width="2.1" />
    <line x1="400" y1="573" x2="400" y2="738" stroke-width="3.2" />
    <line x1="374" y1="571" x2="363" y2="719" stroke-width="2.1" />
    <line x1="349" y1="565" x2="326" y2="724" stroke-width="2.3" />
    <line x1="325" y1="555" x2="283" y2="719" stroke-width="2.5" />
    <line x1="303" y1="542" x2="247" y2="644" stroke-width="2.2" />
    <line x1="283" y1="525" x2="210" y2="618" stroke-width="2.5" />
    <line x1="267" y1="505" x2="157" y2="592" stroke-width="2.2" />
    <line x1="254" y1="483" x2="126" y2="553" stroke-width="2.3" />
    <line x1="244" y1="459" x2="94" y2="514" stroke-width="2.1" />
    <line x1="237" y1="434" x2="72" y2="477" stroke-width="2.5" />
    <line x1="233" y1="408" x2="58" y2="429" stroke-width="2.1" />
    <line x1="231" y1="381" x2="50" y2="381" stroke-width="2.6" />
    <line x1="233" y1="355" x2="58" y2="334" stroke-width="2.2" />
    <line x1="237" y1="329" x2="71" y2="287" stroke-width="2.5" />
    <line x1="244" y1="303" x2="94" y2="245" stroke-width="2.1" />
    <line x1="254" y1="278" x2="124" y2="208" stroke-width="2.4" />
    <line x1="267" y1="255" x2="156" y2="176" stroke-width="2.4" />
    <line x1="283" y1="233" x2="180" y2="142" stroke-width="2.1" />
    <line x1="303" y1="214" x2="210" y2="120" stroke-width="2.6" />
    <line x1="325" y1="196" x2="247" y2="97" stroke-width="2.3" />
    <line x1="349" y1="183" x2="283" y2="81" stroke-width="2.5" />
    <line x1="374" y1="173" x2="325" y2="73" stroke-width="2.7" />
  </g>

  <!-- Core -->
  <circle
    cx="400"
    cy="400"
    r="178"
    fill="url(#coreGlow)"
    filter="url(#bigGlow)"
  />
  <circle
    cx="400"
    cy="400"
    r="172"
    fill="url(#innerMist)"
  />

  <!-- Inner texture -->
  <g clip-path="url(#coreClip)" opacity="0.9">
    <g stroke-linecap="round" fill="none">
      <path
        d="M251 391 C305 338, 355 318, 414 354 C455 380, 500 376, 551 332"
        stroke="#c8ff7a"
        stroke-width="14"
        stroke-opacity="0.18"
      />
      <path
