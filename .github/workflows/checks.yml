name: checks

on:
  push:
    branches:
      - main
      - stage
      - dev
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command:
          - frontend-typecheck
          - frontend-lint
          - frontend-format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: make install

      - name: Run ${{ matrix.command }}
        run: npx lefthook run pre-commit --command ${{ matrix.command }} --all-files
